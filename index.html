<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a1a;--glass:rgba(255,255,255,.08);--glass-border:rgba(255,255,255,.12);--glass-strong:rgba(255,255,255,.15);--accent:#6c63ff;--accent-glow:rgba(108,99,255,.4);--accent2:#00d4aa;--danger:#ff4757;--warning:#ffa502;--text:#e8e8f0;--text-dim:#8888a8;--text-muted:#555570;--radius:16px;--radius-sm:10px;--radius-xs:6px;--shadow:0 8px 32px rgba(0,0,0,.4);--transition:all .3s cubic-bezier(.4,0,.2,1)}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6}
.bg-animation{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}.bg-animation .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;animation:float 20s ease-in-out infinite}.bg-animation .orb:nth-child(1){width:600px;height:600px;background:#6c63ff;top:-10%;left:-10%}.bg-animation .orb:nth-child(2){width:400px;height:400px;background:#00d4aa;bottom:-10%;right:-10%;animation-delay:-7s}.bg-animation .orb:nth-child(3){width:300px;height:300px;background:#ff6b9d;top:50%;left:50%;animation-delay:-14s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(50px,-80px) scale(1.1)}50%{transform:translate(-30px,60px) scale(.95)}75%{transform:translate(-60px,-40px) scale(1.05)}}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(108,99,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,.03) 1px,transparent 1px);background-size:60px 60px}
.glass{background:var(--glass);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--glass-border);border-radius:var(--radius);box-shadow:var(--shadow)}.glass-strong{background:var(--glass-strong)}
.app{position:relative;z-index:1;min-height:100vh}.container{max-width:1200px;margin:0 auto;padding:0 24px;width:100%}
.page{display:none;animation:fadeIn .4s ease}.page.active{display:block}.page.login-page.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.header{padding:16px 0;position:sticky;top:0;z-index:100;background:rgba(10,10,26,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border)}.header-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:12px;font-weight:700;font-size:1.2rem}.logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 0 20px var(--accent-glow)}.logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:.85rem;font-weight:500;cursor:pointer;transition:var(--transition);white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;box-shadow:0 4px 15px var(--accent-glow)}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 25px var(--accent-glow)}
.btn-secondary{background:var(--glass);color:var(--text);border:1px solid var(--glass-border)}.btn-secondary:hover{background:rgba(255,255,255,.1);border-color:var(--accent)}
.btn-danger{background:rgba(255,71,87,.15);color:var(--danger);border:1px solid rgba(255,71,87,.2)}.btn-danger:hover{background:rgba(255,71,87,.25)}
.btn-success{background:rgba(0,212,170,.15);color:var(--accent2);border:1px solid rgba(0,212,170,.2)}.btn-success:hover{background:rgba(0,212,170,.25)}
.btn-sm{padding:7px 12px;font-size:.78rem;border-radius:var(--radius-xs)}
.btn-icon{width:36px;height:36px;padding:0;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;background:var(--glass);border:1px solid var(--glass-border);color:var(--text);cursor:pointer;transition:var(--transition);position:relative}.btn-icon:hover{background:rgba(255,255,255,.1);border-color:var(--accent);color:var(--accent)}
.notif-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:8px;background:var(--danger);color:#fff;font-size:.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,.5)}50%{box-shadow:0 0 0 6px rgba(255,71,87,0)}}
.login-page{align-items:center;justify-content:center;min-height:100vh;padding:24px;width:100%}.login-card{width:100%;max-width:400px;padding:44px 36px;text-align:center}.login-card .logo-icon{width:60px;height:60px;font-size:1.6rem;margin:0 auto 20px}.login-card h1{font-size:1.6rem;margin-bottom:8px}.login-card>p{color:var(--text-dim);margin-bottom:28px;font-size:.85rem}.login-error{color:var(--danger);font-size:.82rem;margin-bottom:14px;display:none}
.input-group{position:relative;margin-bottom:18px;text-align:left}.input-group label{display:block;font-size:.75rem;font-weight:500;color:var(--text-dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}.input-group input,.input-group select,.input-group textarea{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1px solid var(--glass-border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:.9rem;transition:var(--transition);outline:none}.input-group input:focus,.input-group select:focus,.input-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}.input-group textarea{resize:vertical;min-height:70px}.input-group select{appearance:none;cursor:pointer}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin:28px 0}.stat-card{padding:18px;display:flex;align-items:center;gap:12px;transition:var(--transition);cursor:pointer}.stat-card:hover{transform:translateY(-3px);border-color:rgba(108,99,255,.3)}.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem}.stat-icon.purple{background:rgba(108,99,255,.15);color:var(--accent)}.stat-icon.green{background:rgba(0,212,170,.15);color:var(--accent2)}.stat-icon.orange{background:rgba(255,165,2,.15);color:var(--warning)}.stat-icon.red{background:rgba(255,71,87,.15);color:var(--danger)}.stat-info h3{font-size:1.3rem;font-weight:700;line-height:1}.stat-info p{font-size:.7rem;color:var(--text-dim);margin-top:2px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}.section-header h2{font-size:1.2rem;font-weight:600;display:flex;align-items:center;gap:8px}.section-header h2 i{color:var(--accent)}
.members-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:40px}.member-card{padding:20px;cursor:pointer;transition:var(--transition);position:relative;overflow:hidden}.member-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transform:scaleX(0);transform-origin:left;transition:transform .3s ease}.member-card:hover{transform:translateY(-3px);border-color:rgba(108,99,255,.3)}.member-card:hover::before{transform:scaleX(1)}
.member-avatar{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:#fff;box-shadow:0 4px 12px var(--accent-glow);flex-shrink:0;overflow:hidden}.member-avatar img,.profile-avatar img{width:100%;height:100%;object-fit:cover}
.member-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:rgba(255,255,255,.05);border-radius:20px;font-size:.72rem;color:var(--text-dim)}.member-tag.blood{background:rgba(255,71,87,.1);color:#ff6b81}.member-tag.relation{background:rgba(108,99,255,.12);color:var(--accent)}.member-tag.alert{background:rgba(255,71,87,.1);color:var(--danger)}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:rgba(255,255,255,.03);border-radius:var(--radius-sm);padding:4px;border:1px solid var(--glass-border);overflow-x:auto}.tab-btn{flex:1;padding:10px 14px;border:none;border-radius:var(--radius-xs);background:transparent;color:var(--text-dim);font-family:inherit;font-size:.82rem;font-weight:500;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap}.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.04)}.tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 10px var(--accent-glow)}
.back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--text-dim);font-size:.85rem;cursor:pointer;margin-bottom:20px;transition:var(--transition)}.back-btn:hover{color:var(--accent)}
.profile-avatar{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:#fff;box-shadow:0 4px 16px var(--accent-glow);overflow:hidden;flex-shrink:0}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.info-item{padding:12px;background:rgba(255,255,255,.03);border-radius:var(--radius-sm)}.info-item label{font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);display:block;margin-bottom:3px}.info-item span{font-size:.9rem;font-weight:500}
.copy-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;border:none;background:rgba(108,99,255,.12);color:var(--accent);cursor:pointer;font-size:.65rem;margin-left:5px;transition:var(--transition);vertical-align:middle}.copy-btn:hover{background:rgba(108,99,255,.25)}
.record-card{padding:18px;border-radius:var(--radius-sm);background:rgba(255,255,255,.03);border:1px solid var(--glass-border);margin-bottom:12px}.record-body{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.83rem}.record-body .rl{color:var(--text-muted);font-size:.68rem;text-transform:uppercase}
.med-card{padding:16px;border-radius:var(--radius-sm);background:rgba(255,255,255,.03);border:1px solid var(--glass-border);margin-bottom:12px;display:flex;gap:14px;align-items:center}.med-card.low{border-color:rgba(255,165,2,.4);background:rgba(255,165,2,.02)}.med-card.out{border-color:rgba(255,71,87,.4);background:rgba(255,71,87,.02)}
.med-icon{width:40px;height:40px;border-radius:10px;background:rgba(108,99,255,.12);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}.med-card.low .med-icon{background:rgba(255,165,2,.15);color:var(--warning)}.med-card.out .med-icon{background:rgba(255,71,87,.15);color:var(--danger)}
.med-info{flex:1;min-width:0}.med-info h4{font-size:.9rem;font-weight:600;margin-bottom:2px}.med-info .med-sub{font-size:.78rem;color:var(--text-dim)}
.med-stock{text-align:right;flex-shrink:0}.med-stock .num{font-size:1.2rem;font-weight:700}.med-stock .lbl{font-size:.65rem;color:var(--text-dim)}.stock-bar{width:70px;height:5px;border-radius:3px;background:rgba(255,255,255,.1);margin-top:4px;overflow:hidden}.stock-bar div{height:100%;border-radius:3px}.stock-bar .good{background:var(--accent2)}.stock-bar .warn{background:var(--warning)}.stock-bar .bad{background:var(--danger)}
.doc-table{width:100%;border-collapse:collapse}.doc-table th{text-align:left;padding:10px 14px;font-size:.72rem;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--glass-border)}.doc-table td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.85rem}
.doc-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:500}.doc-badge.id-doc{background:rgba(108,99,255,.15);color:var(--accent)}.doc-badge.medical{background:rgba(0,212,170,.15);color:var(--accent2)}.doc-badge.insurance{background:rgba(255,165,2,.15);color:var(--warning)}.doc-badge.other{background:rgba(255,255,255,.08);color:var(--text-dim)}
.empty-state{text-align:center;padding:40px;color:var(--text-dim)}.empty-state i{font-size:2.5rem;margin-bottom:12px;opacity:.3}
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px}.modal-overlay.active{display:flex}.modal{width:100%;max-width:540px;max-height:85vh;overflow-y:auto;padding:32px;animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h2{font-size:1.2rem;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:10px}.modal h2 i{color:var(--accent)}.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.photo-upload{display:flex;align-items:center;gap:14px;margin-bottom:18px}.photo-preview{width:64px;height:64px;border-radius:14px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;overflow:hidden}.photo-preview img{width:100%;height:100%;object-fit:cover}
.file-drop{border:2px dashed var(--glass-border);border-radius:var(--radius-sm);padding:28px;text-align:center;cursor:pointer;transition:var(--transition);margin-bottom:14px}.file-drop:hover,.file-drop.dragover{border-color:var(--accent);background:rgba(108,99,255,.05)}.file-drop i{font-size:1.8rem;color:var(--text-muted);margin-bottom:6px}.file-drop p{color:var(--text-dim);font-size:.82rem}.file-drop .file-name{color:var(--accent);font-weight:500;margin-top:6px}
.img-viewer{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:24px;cursor:zoom-out}.img-viewer.active{display:flex}.img-viewer img{max-width:90vw;max-height:75vh;border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.6);object-fit:contain}.img-viewer .viewer-actions{display:flex;gap:10px}.img-viewer .viewer-name{color:var(--text-dim);font-size:.85rem;margin-bottom:4px}
.att-thumb{width:48px;height:48px;border-radius:8px;overflow:hidden;border:1px solid var(--glass-border);cursor:pointer;transition:var(--transition);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.03)}.att-thumb:hover{border-color:var(--accent);transform:scale(1.05)}.att-thumb img{width:100%;height:100%;object-fit:cover}.att-thumb i{font-size:1.1rem;color:var(--text-muted)}
.att-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:6px;transition:var(--transition);cursor:pointer}.att-row:hover{background:rgba(255,255,255,.04)}
.att-row.rx{border-left:3px solid var(--accent2);background:rgba(0,212,170,.03)}.att-row.report{border-left:3px solid var(--accent);background:rgba(108,99,255,.03)}.att-row.general{border-left:3px solid var(--warning);background:rgba(255,165,2,.03)}
.notif-panel{position:absolute;top:calc(100% + 8px);right:0;width:340px;max-height:360px;overflow-y:auto;padding:16px;z-index:200;display:none}.notif-panel.show{display:block}.notif-item{padding:10px;border-radius:var(--radius-xs);background:rgba(255,255,255,.03);margin-bottom:6px;border-left:3px solid var(--warning);font-size:.82rem}.notif-item.urgent{border-left-color:var(--danger)}.notif-item b{display:block;margin-bottom:2px}.notif-item span{color:var(--text-dim);font-size:.75rem}
.toast-container{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}.toast{padding:12px 18px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:8px;font-size:.85rem;animation:toastIn .3s ease;min-width:240px;background:rgba(20,20,40,.95);backdrop-filter:blur(20px);border:1px solid var(--glass-border)}.toast.success{border-left:3px solid var(--accent2)}.toast.error{border-left:3px solid var(--danger)}.toast.warning{border-left:3px solid var(--warning)}.toast.info{border-left:3px solid var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.spinner{width:30px;height:30px;border:3px solid var(--glass-border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.search-box{position:relative}.search-box input{width:200px;padding:8px 14px 8px 34px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:.85rem;outline:none;transition:var(--transition)}.search-box input:focus{border-color:var(--accent);width:260px}.search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.8rem}
@media(max-width:768px){.members-grid{grid-template-columns:1fr}.info-grid{grid-template-columns:1fr}.stats-bar{grid-template-columns:1fr 1fr}.search-box input{width:140px}.record-body{grid-template-columns:1fr}.notif-panel{width:calc(100vw - 48px)}.header-actions .btn span.hide-mobile{display:none}.med-card{flex-wrap:wrap}.med-stock{margin-left:54px}.profile-avatar{width:44px;height:44px;font-size:1.2rem;border-radius:12px}#memberActions{gap:6px}#memberActions .btn{padding:8px 12px;font-size:.78rem}}
@media(max-width:480px){.stats-bar{grid-template-columns:1fr}html{font-size:14px}.tab-btn{padding:8px 10px;font-size:.72rem}.tab-btn i{display:none}.header-inner{gap:6px}.search-box{order:10;width:100%}.search-box input{width:100%}.login-card{padding:28px 20px}#memberActions .btn{flex:1;justify-content:center;min-width:0}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:3px}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;box-shadow:0 6px 25px var(--accent-glow);z-index:50;transition:var(--transition);border:none}.fab:hover{transform:scale(1.1)}
.emergency-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid var(--danger);border-radius:var(--radius);padding:24px;max-width:400px;margin:0 auto}
.emergency-card h3{color:var(--danger);font-size:1rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.emergency-card .ec-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.88rem}.ec-row:last-child{border:none}.ec-row .ec-label{color:var(--text-dim);font-size:.75rem;text-transform:uppercase}.ec-row .ec-val{font-weight:600;text-align:right}
.followup-card{padding:12px 16px;border-radius:var(--radius-sm);background:rgba(255,165,2,.06);border:1px solid rgba(255,165,2,.2);margin-bottom:8px;display:flex;align-items:center;gap:12px;font-size:.85rem}.followup-card .fu-date{font-weight:600;color:var(--warning)}.followup-card .fu-doc{color:var(--text-dim);font-size:.78rem}
.chart-card{padding:20px;margin-bottom:16px}.chart-card h4{font-size:.9rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}.chart-card canvas{width:100%!important;max-height:220px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.metric-mini{padding:14px;border-radius:var(--radius-sm);background:rgba(255,255,255,.03);border:1px solid var(--glass-border);text-align:center;transition:var(--transition)}.metric-mini:hover{border-color:rgba(108,99,255,.3)}

<script>
// ============================================================
// CONFIGURATION — Edit these two lines for Google Mode:
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwI4A32MC4NMgJcAgQIMRfXczbKx_JOpsQdpK1Rj_-U60bgdBiVL9U-elWvEOweRCUhhQ/exec';
// Google mode when a valid Apps Script URL is set; otherwise local (localStorage) mode.
const LOCAL_MODE = !APPS_SCRIPT_URL || !/^https:\/\/script\.google\.com\//.test(APPS_SCRIPT_URL);
// ============================================================

// FamilyVault - Complete App
// ===== Storage layer: localStorage (LOCAL_MODE) OR Google Sheets (cache-backed) =====
let cache={}, fileCache={}, uploadedMap={};
function _lsGet(k,d){try{return JSON.parse(localStorage.getItem('fv_'+k))||d}catch(e){return d}}
function _lsSet(k,v){try{localStorage.setItem('fv_'+k,JSON.stringify(v))}catch(e){}}
const LS={
  get:(k,d)=>{ if(LOCAL_MODE) return _lsGet(k,d); return (k in cache)?cache[k]:d; },
  set:(k,v)=>{ if(LOCAL_MODE){ _lsSet(k,v); return; } cache[k]=v; persistKey(k,v); }
};
const API={
  token: localStorage.getItem('fv_token')||'',
  setToken(t){this.token=t;localStorage.setItem('fv_token',t)},
  clearToken(){this.token='';localStorage.removeItem('fv_token')},
  async call(action,params,postBody){
    const url=new URL(APPS_SCRIPT_URL);
    url.searchParams.set('action',action);
    if(this.token) url.searchParams.set('token',this.token);
    if(params) Object.keys(params).forEach(k=>url.searchParams.set(k,params[k]));
    const opts={redirect:'follow'};
    if(postBody){opts.method='POST';opts.headers={'Content-Type':'text/plain'};opts.body=JSON.stringify(postBody)}
    const resp=await fetch(url.toString(),opts);
    return await resp.json();
  },
  login(u,p){return this.call('verifyPassword',{username:u,password:p})},
  getAll(){return this.call('getAll')},
  setKey(key,value){return this.call('setKey',null,{key:key,value:value})},
  uploadFile(b){return this.call('uploadFile',null,b)},
  getFile(id){return this.call('getFile',{fileId:id})}
};
function isDataUrl(s){return typeof s==='string'&&s.indexOf('data:')===0&&s.length>200}
// Replace inline base64 (photos/files) with a private Drive reference before saving to the sheet
async function slim(v){
  if(Array.isArray(v)){const out=[];for(const x of v)out.push(await slim(x));return out}
  if(v&&typeof v==='object'){const out={};for(const k of Object.keys(v))out[k]=await slim(v[k]);return out}
  if(isDataUrl(v)){
    if(uploadedMap[v]) return uploadedMap[v];
    try{
      const mime=v.substring(5,v.indexOf(';'));const b64=v.split(',')[1];
      const r=await API.uploadFile({base64:b64,mimeType:mime,name:'fv_'+Date.now()});
      if(r&&r.success){const ref='drive:'+r.fileId;uploadedMap[v]=ref;fileCache[r.fileId]=v;return ref}
      toast('File not saved to Drive: '+((r&&r.error)||'check FOLDER_ID / permissions'),'error');
    }catch(e){toast('Drive upload failed: '+e.message,'error')}
    return v;
  }
  return v;
}
// Resolve Drive references back into base64 for display
async function fatten(v){
  if(Array.isArray(v)){const out=[];for(const x of v)out.push(await fatten(x));return out}
  if(v&&typeof v==='object'){const out={};for(const k of Object.keys(v))out[k]=await fatten(v[k]);return out}
  if(typeof v==='string'&&v.indexOf('drive:')===0){
    const id=v.slice(6);
    if(fileCache[id]){uploadedMap[fileCache[id]]=v;return fileCache[id]}
    try{const r=await API.getFile(id);if(r&&r.success){fileCache[id]=r.data;uploadedMap[r.data]=v;return r.data}}catch(e){}
    return '';
  }
  return v;
}
let _persistChain=Promise.resolve();
function snapStrip(v){if(Array.isArray(v))return v.map(snapStrip);if(v&&typeof v==='object'){var o={};for(var k in v)o[k]=snapStrip(v[k]);return o}if(isDataUrl(v))return '';return v}
function saveSnapshot(){try{var s={};Object.keys(cache).forEach(function(k){s[k]=snapStrip(cache[k])});localStorage.setItem('fv_snapshot',JSON.stringify(s))}catch(e){}}
function loadSnapshot(){try{var s=localStorage.getItem('fv_snapshot');if(!s)return false;var d=JSON.parse(s);cache={};Object.keys(d).forEach(function(k){cache[k]=d[k]});return true}catch(e){return false}}
function persistKey(k,v){
  _persistChain=_persistChain.then(async()=>{
    if(typeof navigator!=='undefined'&&navigator.onLine===false){setSyncStatus('offline');return}
    setSyncStatus('saving');
    try{
      const slimmed=await slim(v);
      const res=await API.setKey(k,JSON.stringify(slimmed));
      if(res&&res.error&&/unauthor/i.test(res.error)){API.clearToken();localStorage.removeItem('fv_auth');toast('Session expired. Please log in again.','error');showPage('loginPage')}
      else if(res&&!res.success){setSyncStatus('error');toast('Save failed. Check your connection.','error')}
      else{setSyncStatus('saved');saveSnapshot()}
    }catch(e){setSyncStatus('offline')}
  });
  return _persistChain;
}
async function bootstrap(){
  let res;
  try{res=await API.getAll()}catch(e){res=null}
  if(!res||!res.success){
    if(res&&res.error&&/unauthor/i.test(res.error)){API.clearToken();return false}
    if(loadSnapshot()){setSyncStatus('offline');return true}
    return false;
  }
  const data=res.data||{};
  cache={};
  await Promise.all(Object.keys(data).map(async k=>{
    let val=data[k];
    try{val=typeof val==='string'?JSON.parse(val):val}catch(e){}
    cache[k]=await fatten(val);
  }));
  saveSnapshot();
  return true;
}
function setSyncStatus(state){var el=document.getElementById('syncChip');if(!el){el=document.createElement('div');el.id='syncChip';el.className='sync-chip';document.body.appendChild(el)}var map={saving:{t:'Saving…',c:'saving',i:'fa-cloud-arrow-up'},saved:{t:'Saved',c:'saved',i:'fa-circle-check'},offline:{t:'Offline',c:'offline',i:'fa-triangle-exclamation'},error:{t:'Sync error',c:'offline',i:'fa-triangle-exclamation'}};var m=map[state]||map.saved;el.className='sync-chip show '+m.c;el.innerHTML='<i class="fas '+m.i+'"></i> '+m.t;clearTimeout(el._t);if(state==='saved'){el._t=setTimeout(function(){el.classList.remove('show')},1600)}}
let members=[],currentMember=null,selectedPhoto=null,selectedFile=null,activeTab='profile',allAlerts=[];
const esc=s=>{if(s==null)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML};

const fmtDate=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';
function relDate(d){if(!d)return '—';var dt=new Date(d+'T00:00:00');if(isNaN(dt.getTime()))return fmtDate(d);var t=new Date();t.setHours(0,0,0,0);var diff=Math.round((dt-t)/86400000);if(diff===0)return 'Today';if(diff===1)return 'Tomorrow';if(diff===-1)return 'Yesterday';if(diff>1&&diff<=30)return 'in '+diff+' days';if(diff<-1&&diff>=-30)return (-diff)+' days ago';return fmtDate(d)}

function toast(msg,type){type=type||'info';const c=document.getElementById('toastContainer'),el=document.createElement('div');el.className='toast '+type;const icons={success:'fa-circle-check',error:'fa-circle-xmark',warning:'fa-triangle-exclamation',info:'fa-circle-info'};el.innerHTML='<i class="fas '+(icons[type]||icons.info)+'"></i> '+esc(msg);c.appendChild(el);setTimeout(function(){el.style.opacity='0';setTimeout(function(){el.remove()},300)},3500)}

// RENDER APP SHELL
document.getElementById('app').innerHTML='<div class="login-page page active" id="loginPage"><div class="login-card glass"><div class="logo-icon"><i class="fas fa-shield-halved"></i></div><h1>FamilyVault</h1><p>Secure family portal for documents, medical records &amp; medications.</p><div class="login-error" id="loginError"><i class="fas fa-exclamation-circle"></i> <span></span></div><div id="setupHint" style="display:none;background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);border-radius:10px;padding:12px;margin-bottom:16px;font-size:.82rem;color:var(--accent2);text-align:left"><i class="fas fa-wand-magic-sparkles"></i> <b>First time?</b> Enter any username + password to set up your vault.</div><div class="input-group"><label>Username</label><input type="text" id="usernameInput" placeholder="Enter username" autocomplete="off"></div><div class="input-group"><label>Password</label><input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off"></div><button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px" onclick="handleLogin()"><i class="fas fa-lock-open"></i> Unlock</button></div></div><div class="page" id="dashboardPage"><header class="header"><div class="container header-inner"><button class="btn-icon hamburger" onclick="toggleSidebar()" aria-label="Menu"><i class="fas fa-bars"></i></button><div class="logo"><div class="logo-icon"><i class="fas fa-shield-halved"></i></div><span>FamilyVault</span></div><div class="header-actions"><div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="Search..." id="searchInput" oninput="filterMembers()"></div><button class="btn-icon" onclick="openGlobalSearch()" title="Search everything"><i class="fas fa-magnifying-glass"></i></button><button class="btn-icon" onclick="toggleNotif()" id="notifBtn"><i class="fas fa-bell"></i><span class="notif-badge" id="notifBadge" style="display:none">0</span><div class="notif-panel glass glass-strong" id="notifPanel"><h3><i class="fas fa-pills" style="color:var(--warning)"></i> Medication Alerts</h3><div id="notifList"></div></div></button><button class="btn btn-primary" onclick="openMemberModal()"><i class="fas fa-user-plus"></i> Add</button><button class="btn-icon" onclick="handleLogout()"><i class="fas fa-right-from-bracket"></i></button></div></div></header><main class="container" style="padding:16px 24px 48px"><div class="stats-bar"><div class="stat-card glass" onclick="showStatDetail(\'members\')" style="cursor:pointer"><div class="stat-icon purple"><i class="fas fa-users"></i></div><div class="stat-info"><h3 id="statMembers">0</h3><p>Members</p></div></div><div class="stat-card glass" onclick="showStatDetail(\'docs\')" style="cursor:pointer"><div class="stat-icon green"><i class="fas fa-file-shield"></i></div><div class="stat-info"><h3 id="statDocs">0</h3><p>Documents</p></div></div><div class="stat-card glass" onclick="showStatDetail(\'meds\')" style="cursor:pointer"><div class="stat-icon orange"><i class="fas fa-pills"></i></div><div class="stat-info"><h3 id="statMeds">0</h3><p>Active Meds</p></div></div><div class="stat-card glass" onclick="showStatDetail(\'alerts\')" style="cursor:pointer"><div class="stat-icon red"><i class="fas fa-triangle-exclamation"></i></div><div class="stat-info"><h3 id="statAlerts">0</h3><p>Restock Alerts</p></div></div></div><div class="section-header"><h2><i class="fas fa-users-line"></i> Family Members</h2></div><div class="members-grid" id="membersGrid"></div></main></div><div class="page" id="memberPage"><header class="header"><div class="container header-inner"><button class="btn-icon hamburger" onclick="toggleSidebar()" aria-label="Menu"><i class="fas fa-bars"></i></button><div class="logo"><div class="logo-icon"><i class="fas fa-shield-halved"></i></div><span>FamilyVault</span></div><div class="header-actions"><button class="btn-icon" onclick="handleLogout()"><i class="fas fa-right-from-bracket"></i></button></div></div></header><main class="container" style="padding:16px 24px 48px"><div class="back-btn" onclick="showDashboard()"><i class="fas fa-arrow-left"></i> Back to Dashboard</div><div class="glass" style="padding:18px 22px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap" id="profileBar"></div><div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap" id="memberActions"><button class="btn btn-secondary" onclick="openMemberModal(currentMember)"><i class="fas fa-pen"></i> Edit</button><button class="btn btn-secondary" onclick="showMemberTimeline()"><i class="fas fa-clock-rotate-left"></i> Timeline</button><button class="btn btn-secondary" onclick="generateMemberPDF(currentMember)"><i class="fas fa-file-pdf"></i> PDF</button><button class="btn btn-danger" onclick="confirmDelete()"><i class="fas fa-trash-can"></i> Delete</button></div><div class="member-body"><div class="tabs" id="tabsBar"></div><div id="tabContent"></div></div></main></div>';

var modalsHTML='<div class="modal-overlay" id="memberModal"><div class="modal glass glass-strong" id="memberModalInner"></div></div><div class="modal-overlay" id="visitModal"><div class="modal glass glass-strong" id="visitModalInner"></div></div><div class="modal-overlay" id="medModal"><div class="modal glass glass-strong" id="medModalInner"></div></div><div class="modal-overlay" id="docModal"><div class="modal glass glass-strong" id="docModalInner"></div></div><div class="modal-overlay" id="confirmModal"><div class="modal glass glass-strong" style="max-width:500px;text-align:center" id="confirmModalInner"></div></div><div class="modal-overlay" id="restockModal"><div class="modal glass glass-strong" style="max-width:360px" id="restockModalInner"></div></div><div class="modal-overlay" id="metricModal"><div class="modal glass glass-strong" id="metricModalInner"></div></div>';

function localHash(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return'fvh_'+Math.abs(h).toString(36)}
function handleLogin(){
  var user=(document.getElementById('usernameInput').value||'').trim().toLowerCase();
  var pw=document.getElementById('passwordInput').value.trim();
  var errEl=document.getElementById('loginError');
  if(!user||!pw){errEl.querySelector('span').textContent='Enter username and password.';errEl.style.display='block';return}
  if(LOCAL_MODE){
    var users=_lsGet('users',{});var key=localHash(user+':'+pw);
    if(!Object.keys(users).length){users[user]={hash:key,role:'admin',created:new Date().toISOString()};_lsSet('users',users);localStorage.setItem('fv_auth','1');localStorage.setItem('fv_user',user);toast('Account created! You are admin.','success');showDashboard()}
    else if(users[user]&&users[user].hash===key){localStorage.setItem('fv_auth','1');localStorage.setItem('fv_user',user);showDashboard()}
    else if(users[user]){errEl.querySelector('span').textContent='Wrong password.';errEl.style.display='block'}
    else{errEl.querySelector('span').textContent='User not found. Ask admin to add you.';errEl.style.display='block'}
    return;
  }
  // Google mode: authenticate against the sheet, then load the vault
  errEl.style.display='none';
  var btn=document.querySelector('.login-card .btn-primary');var orig=btn.innerHTML;
  btn.innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0 auto"></div>';btn.disabled=true;
  API.login(user,pw).then(async function(res){
    if(!res){btn.innerHTML=orig;btn.disabled=false;errEl.querySelector('span').textContent='Network error. Try again.';errEl.style.display='block';return}
    if(res.valid){
      API.setToken(res.token);localStorage.setItem('fv_auth','1');localStorage.setItem('fv_user',res.username);
      btn.innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0 auto"></div>';
      await bootstrap();
      btn.innerHTML=orig;btn.disabled=false;
      toast(res.created?'Vault created! You are admin.':'Welcome, '+res.username+'!','success');
      showDashboard();
    }else{
      btn.innerHTML=orig;btn.disabled=false;errEl.querySelector('span').textContent=res.error||'Invalid credentials.';errEl.style.display='block';
    }
  }).catch(function(e){btn.innerHTML=orig;btn.disabled=false;errEl.querySelector('span').textContent='Network error: '+e.message;errEl.style.display='block'});
}

var docFilter='all';var docRerender=function(){};
function docCat(t){t=(t||'').toLowerCase();if(['aadhaar','pan','passport','driving','voter','birth'].some(function(k){return t.indexOf(k)>=0}))return{cat:'id',icon:'fa-id-card',clr:'var(--accent)',grad:'rgba(108,99,255,.08)',brd:'rgba(108,99,255,.25)'};if(['medical','prescription','lab','x-ray','discharge','report'].some(function(k){return t.indexOf(k)>=0}))return{cat:'medical',icon:'fa-file-medical',clr:'var(--accent2)',grad:'rgba(0,212,170,.08)',brd:'rgba(0,212,170,.25)'};if(t.indexOf('insurance')>=0)return{cat:'insurance',icon:'fa-file-shield',clr:'#ff6b9d',grad:'rgba(255,107,157,.08)',brd:'rgba(255,107,157,.25)'};return{cat:'general',icon:'fa-file',clr:'var(--warning)',grad:'rgba(255,165,2,.08)',brd:'rgba(255,165,2,.25)'}}
function docRow(d,key,sharedFrom){var ci=docCat(d.type);var hasImg=d.dataUrl&&d.dataUrl.indexOf('image')>=0;var tagHtml=(d.tags&&d.tags.length)?'<div style="margin-top:4px">'+d.tags.map(function(t){return'<span class="tag-chip">#'+esc(t)+'</span>'}).join('')+'</div>':'';var expHtml=d.expiry?' &middot; <span style="color:var(--warning)"><i class="fas fa-hourglass-half"></i> exp '+relDate(d.expiry)+'</span>':'';var badge=sharedFrom?'<span class="tag-chip" style="background:rgba(0,212,170,.14);color:var(--accent2)"><i class="fas fa-share-nodes"></i> from '+esc(sharedFrom)+'</span>':'';var actions=sharedFrom?'<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();viewFile(\''+d.id+'\',\''+key+'\')" title="View"><i class="fas fa-eye"></i></button><button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();downloadDoc(\''+d.id+'\',\''+key+'\')" title="Download"><i class="fas fa-download"></i></button>':'<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();renameDoc(\''+d.id+'\',\''+key+'\')" title="Edit"><i class="fas fa-pen"></i></button><button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();downloadDoc(\''+d.id+'\',\''+key+'\')" title="Download"><i class="fas fa-download"></i></button><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteDoc(\''+d.id+'\',\''+key+'\')" title="Delete"><i class="fas fa-trash-can"></i></button>';return'<div style="display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:12px;background:'+ci.grad+';border:1px solid '+ci.brd+';margin-bottom:10px;cursor:pointer" onclick="viewFile(\''+d.id+'\',\''+key+'\')"><div class="att-thumb" style="border-color:'+ci.brd+'">'+(hasImg?'<img src="'+d.dataUrl+'">':'<i class="fas '+ci.icon+'" style="color:'+ci.clr+'"></i>')+'</div><div style="flex:1;min-width:0"><div style="font-size:.9rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(d.name)+' '+badge+'</div><div style="font-size:.72rem;color:var(--text-dim);margin-top:2px"><span class="doc-badge '+(ci.cat==='id'?'id-doc':ci.cat==='medical'?'medical':ci.cat==='insurance'?'insurance':'other')+'"><i class="fas '+ci.icon+'"></i> '+esc(d.type)+'</span> &middot; '+relDate((d.date||'').split('T')[0])+expHtml+'</div>'+tagHtml+'</div><div style="display:flex;gap:6px">'+actions+'</div></div>'}
function docFilterBar(own){var tagSet={};own.forEach(function(d){(d.tags||[]).forEach(function(t){tagSet[t]=1})});var tags=Object.keys(tagSet);var filters=[['all','All'],['id','ID'],['medical','Medical'],['insurance','Insurance'],['general','Other']];return'<div class="doc-filter">'+filters.map(function(f){return'<button class="'+(docFilter===f[0]?'active':'')+'" onclick="docFilter=\''+f[0]+'\';docRerender()">'+f[1]+'</button>'}).join('')+tags.map(function(t){return'<button class="'+(docFilter==='tag:'+t?'active':'')+'" onclick="docFilter=\'tag:'+esc(t).replace(/'/g,"\\'")+'\';docRerender()">#'+esc(t)+'</button>'}).join('')+'</div>'}
function docPass(d){if(docFilter==='all')return true;if(docFilter.indexOf('tag:')===0)return (d.tags||[]).indexOf(docFilter.slice(4))>=0;return docCat(d.type).cat===docFilter}
function renderDocs(c){docRerender=function(){renderTab()};var key='docs_'+currentMember.id;var own=LS.get(key,[]).filter(function(d){return!d.refId});var shared=getSharedInto(currentMember.id);var docs=own.filter(docPass);c.innerHTML='<div class="section-header"><h2><i class="fas fa-folder-open"></i> Documents</h2><div style="display:flex;gap:6px"><button class="btn btn-secondary btn-sm" onclick="openCombineModal(\''+key+'\')"><i class="fas fa-file-circle-plus"></i> Combine</button><button class="btn btn-primary btn-sm" onclick="openDocModal(\''+key+'\',1)"><i class="fas fa-cloud-arrow-up"></i> Upload</button></div></div>'+(own.length?docFilterBar(own):'')+(docs.length?docs.map(function(d){return docRow(d,key,null)}).join(''):'<div class="empty-state"><i class="fas fa-folder-open"></i><p>'+(own.length?'Nothing matches this filter.':'No documents.')+'</p></div>')+(shared.length?'<div style="font-size:.72rem;color:var(--text-muted);text-transform:uppercase;margin:16px 0 8px"><i class="fas fa-share-nodes"></i> Shared with '+esc(currentMember.name)+'</div>'+shared.map(function(s){return docRow(s.d,s.key,s.owner)}).join(''):'')}
function getSharedInto(mid){var out=[];LS.get('members',[]).forEach(function(m2){if(m2.id===mid)return;LS.get('docs_'+m2.id,[]).forEach(function(d){if(!d.refId&&(d.shared||[]).indexOf(mid)>=0)out.push({d:d,key:'docs_'+m2.id,owner:m2.name})})});return out}
function renderGeneralDocs(){docRerender=renderGeneralDocs;var key='docs_general';var all=LS.get(key,[]).filter(function(d){return!d.refId});var docs=all.filter(docPass);var html='<h2 style="justify-content:flex-start"><i class="fas fa-box-archive" style="color:var(--accent)"></i> General Documents</h2><p style="color:var(--text-dim);font-size:.8rem;text-align:left;margin-bottom:10px">Household docs not tied to a member — bills, warranties, agreements, etc.</p><div style="display:flex;gap:6px;margin-bottom:10px"><button class="btn btn-secondary btn-sm" onclick="openCombineModal(\'docs_general\')"><i class="fas fa-file-circle-plus"></i> Combine</button><button class="btn btn-primary btn-sm" onclick="openDocModal(\'docs_general\',0)"><i class="fas fa-cloud-arrow-up"></i> Upload</button></div>'+(all.length?docFilterBar(all):'')+'<div style="text-align:left;max-height:54vh;overflow-y:auto">'+(docs.length?docs.map(function(d){return docRow(d,key,null)}).join(''):'<div class="empty-state"><i class="fas fa-box-archive"></i><p>'+(all.length?'Nothing matches this filter.':'No general documents yet.')+'</p></div>')+'</div><div class="modal-actions" style="justify-content:center"><button class="btn btn-secondary" onclick="modal(\'confirmModal\',false)">Close</button></div>';document.getElementById('confirmModalInner').innerHTML=html;document.getElementById('confirmModal').querySelector('.modal').style.maxWidth='600px';modal('confirmModal',true)}
// ===== Combine documents into one PDF =====
var _pdflibLoading=null;
function loadPdfLib(){if(window.PDFLib)return Promise.resolve(window.PDFLib);if(_pdflibLoading)return _pdflibLoading;_pdflibLoading=new Promise(function(res,rej){var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js';s.onload=function(){res(window.PDFLib)};s.onerror=function(){rej(new Error('load failed'))};document.head.appendChild(s)});return _pdflibLoading}
function _b64ToBytes(b64){var bin=atob(b64);var a=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a}
async function combineToPdf(docsArr,filename){var PDFLib=await loadPdfLib();var out=await PDFLib.PDFDocument.create();for(var i=0;i<docsArr.length;i++){var d=docsArr[i];if(!d.dataUrl)continue;var mime=(d.dataUrl.match(/^data:([^;]+)/)||[])[1]||'';var bytes=_b64ToBytes(d.dataUrl.split(',')[1]);try{if(mime.indexOf('pdf')>=0){var src=await PDFLib.PDFDocument.load(bytes);var pgs=await out.copyPages(src,src.getPageIndices());pgs.forEach(function(p){out.addPage(p)})}else if(mime.indexOf('png')>=0){var pn=await out.embedPng(bytes);var p1=out.addPage([pn.width,pn.height]);p1.drawImage(pn,{x:0,y:0,width:pn.width,height:pn.height})}else if(mime.indexOf('image')>=0){var jp=await out.embedJpg(bytes);var p2=out.addPage([jp.width,jp.height]);p2.drawImage(jp,{x:0,y:0,width:jp.width,height:jp.height})}}catch(e){}}var b=await out.save();var url=URL.createObjectURL(new Blob([b],{type:'application/pdf'}));var a=document.createElement('a');a.href=url;a.download=filename||'combined.pdf';document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(url)},5000)}

var _viewer={url:'',name:'document',fileName:'document'};
function dataUrlToBlobUrl(dataUrl){var parts=dataUrl.split(',');var mime=(parts[0].match(/data:([^;]+)/)||[])[1]||'application/octet-stream';var bin=atob(parts[1]);var arr=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return URL.createObjectURL(new Blob([arr],{type:mime}))}
var _pdfjsLoading=null;
function loadPdfJs(){
  if(window.pdfjsLib)return Promise.resolve(window.pdfjsLib);
  if(_pdfjsLoading)return _pdfjsLoading;
  _pdfjsLoading=new Promise(function(res,rej){
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=function(){try{window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';res(window.pdfjsLib)}catch(e){rej(e)}};
    s.onerror=function(){rej(new Error('Could not load PDF viewer'))};
    document.head.appendChild(s);
  });
  return _pdfjsLoading;
}
async function renderPdfInto(dataUrl,container){
  var lib=await loadPdfJs();
  var raw=atob(dataUrl.split(',')[1]);var arr=new Uint8Array(raw.length);for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
  var pdf=await lib.getDocument({data:arr}).promise;
  container.innerHTML='';
  for(var p=1;p<=pdf.numPages;p++){
    var page=await pdf.getPage(p);
    var vp=page.getViewport({scale:1.4});
    var canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;
    canvas.style.cssText='width:100%;max-width:820px;margin:0 auto 10px;display:block;border-radius:8px;background:#fff';
    container.appendChild(canvas);
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  }
}
function showViewer(dataUrl,name,fileName){
  if(!dataUrl){toast('Preview not available','info');return}
  var mime=(dataUrl.match(/^data:([^;]+)/)||[])[1]||'';
  _viewer={url:dataUrl,name:name||fileName||'document',fileName:fileName||name||'document'};
  var img=document.getElementById('viewerImg'),pdfBox=document.getElementById('viewerPdf'),msg=document.getElementById('viewerMsg');
  document.getElementById('viewerName').textContent=name||fileName||'';
  img.style.display='none';pdfBox.style.display='none';msg.style.display='none';
  img.src='';pdfBox.innerHTML='';
  if(mime.indexOf('image')===0){img.src=dataUrl;img.style.display='block'}

function handleDocFiles(e){var files=e.target.files;if(!files||!files.length)return;var dn=document.getElementById('docName');Array.prototype.forEach.call(files,function(f){if(f.size>25*1024*1024){toast(f.name+' too large (max 25MB)','error');return}var r=new FileReader();r.onload=function(){docQueue.push({name:f.name,mime:f.type,dataUrl:r.result});if(dn&&!dn.value.trim()&&docQueue.length===1)dn.value=f.name.replace(/\.[^.]+$/,'');renderDocQueue()};r.readAsDataURL(f)})}
function renderDocQueue(){var box=document.getElementById('docQueuePreview');if(!box)return;if(!docQueue.length){box.innerHTML='';return}box.innerHTML='<div style="font-size:.72rem;color:var(--text-muted);margin-bottom:6px">'+docQueue.length+' file'+(docQueue.length>1?'s':'')+' ready</div>'+docQueue.map(function(q,i){var img=q.mime&&q.mime.indexOf('image')===0;return'<div style="display:flex;align-items:center;gap:10px;padding:6px 8px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:6px"><div class="att-thumb" style="width:36px;height:36px">'+(img?'<img src="'+q.dataUrl+'">':'<i class="fas fa-file-pdf"></i>')+'</div><div style="flex:1;min-width:0;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(q.name)+'</div><button class="btn btn-danger btn-sm" onclick="docQueue.splice('+i+',1);renderDocQueue()"><i class="fas fa-xmark"></i></button></div>'}).join('')}

};
var metricCharts={};
function getMetrics(){return LS.get('metrics_'+currentMember.id,[])}
function setMetrics(data){LS.set('metrics_'+currentMember.id,data)}
function getLatest(name,all){var filtered=all.filter(function(r){return r.name===name}).sort(function(a,b){return(b.date||'').localeCompare(a.date||'')});return filtered[0]||null}
function getTrend(name,all){var filtered=all.filter(function(r){return r.name===name}).sort(function(a,b){return(a.date||'').localeCompare(b.date||'')});if(filtered.length<2)return{dir:'stable',pct:0};var prev=filtered[filtered.length-2].value,cur=filtered[filtered.length-1].value;var diff=cur-prev;var pct=prev?Math.round(Math.abs(diff/prev)*100):0;return{dir:diff>1?'up':diff<-1?'down':'stable',pct:pct}}
function getStatus(name,val){var m=METRICS[name];if(!m||m.high===999)return'normal';if(val>m.high)return'high';if(val<m.low)return'low-val';return'normal'}

function getHealthSummaryHTML(){var all=getMetrics();if(!all.length)return'';var names=[...new Set(all.map(function(r){return r.name}))];var html='<div class="glass" style="padding:20px;margin-top:16px"><h3 style="margin-bottom:12px;font-size:.95rem"><i class="fas fa-chart-line" style="color:var(--accent);margin-right:6px"></i>Latest Health Snapshot</h3><div class="health-summary">';names.slice(0,8).forEach(function(name){var latest=getLatest(name,all);if(!latest)return;var m=METRICS[name]||{};var status=getStatus(name,latest.value);var cls=status==='high'?'bad':status==='low-val'?'warn':'good';html+='<div class="health-chip '+cls+'"><i class="fas '+(m.icon||'fa-chart-simple')+'"></i><div><div style="font-weight:600;font-size:.85rem">'+latest.value+(m.unit?' '+m.unit:'')+'</div><div style="font-size:.65rem;color:var(--text-dim)">'+esc(name)+'</div></div></div>'});html+='</div></div>';return html}

function renderHealth(c){var all=getMetrics();var names=Object.keys(METRICS);var logged=[...new Set(all.map(function(r){return r.name}))];
c.innerHTML='<div class="section-header"><h2><i class="fas fa-chart-line"></i> Health Metrics</h2><button class="btn btn-primary btn-sm" onclick="openMetricModal()"><i class="fas fa-plus"></i> Log Reading</button></div>';
if(!all.length){c.innerHTML+='<div class="empty-state"><i class="fas fa-chart-line"></i><p>No health readings logged yet. Click <b>Log Reading</b> to track blood sugar, cholesterol, BP and more.</p></div>';return}
c.innerHTML+='<div class="metric-grid" id="metricGrid"></div><div id="chartArea"></div>';
var gridHTML='';logged.forEach(function(name){var latest=getLatest(name,all);var trend=getTrend(name,all);var m=METRICS[name]||{};var status=getStatus(name,latest.value);var trendIcon=trend.dir==='up'?'fa-arrow-up':trend.dir==='down'?'fa-arrow-down':'fa-minus';gridHTML+='<div class="metric-mini '+status+'"><div class="metric-val" style="color:'+(m.color||'var(--text)')+'">'+latest.value+'</div><div class="metric-lbl">'+esc(name)+(m.unit?' ('+m.unit+')':'')+'</div><div class="metric-date">'+fmtDate(latest.date)+'</div><div class="trend '+trend.dir+'"><i class="fas '+trendIcon+'"></i> '+(trend.pct?trend.pct+'%':'stable')+'</div></div>'});
document.getElementById('metricGrid').innerHTML=gridHTML;
var chartHTML='';logged.forEach(function(name,idx){chartHTML+='<div class="chart-card glass"><h4><i class="fas '+(METRICS[name]?METRICS[name].icon:'fa-chart-simple')+'" style="color:'+(METRICS[name]?METRICS[name].color:'var(--accent)')+'"></i>'+esc(name)+'<button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="deleteMetric(\''+esc(name).replace(/'/g,"\\'")+'\')""><i class="fas fa-trash-can"></i></button></h4><canvas id="chart_'+idx+'"></canvas></div>'});
document.getElementById('chartArea').innerHTML=chartHTML;
setTimeout(function(){Object.keys(metricCharts).forEach(function(k){if(metricCharts[k])metricCharts[k].destroy()});metricCharts={};logged.forEach(function(name,idx){var points=all.filter(function(r){return r.name===name}).sort(function(a,b){return(a.date||'').localeCompare(b.date||'')});var canvas=document.getElementById('chart_'+idx);if(!canvas)return;var m=METRICS[name]||{};var ctx=canvas.getContext('2d');metricCharts['c'+idx]=new Chart(ctx,{type:'line',data:{labels:points.map(function(p){return fmtDate(p.date)}),datasets:[{label:name,data:points.map(function(p){return p.value}),borderColor:m.color||'#6c63ff',backgroundColor:(m.color||'#6c63ff')+'20',tension:.4,fill:true,pointRadius:5,pointBackgroundColor:m.color||'#6c63ff',pointBorderColor:'#fff',pointBorderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(10,10,26,.9)',titleColor:'#e8e8f0',bodyColor:'#e8e8f0',borderColor:'rgba(255,255,255,.1)',borderWidth:1,padding:10,displayColors:false,callbacks:{label:function(ctx){return ctx.parsed.y+(m.unit?' '+m.unit:'')}}}},scales:{x:{ticks:{color:'#555570',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#555570',font:{size:10}},grid:{color:'rgba(255,255,255,.06)'},suggestedMin:m.low?m.low*0.8:undefined}},annotation:m.high&&m.high<999?{annotations:{highLine:{type:'line',yMin:m.high,yMax:m.high,borderColor:'rgba(255,71,87,.4)',borderDash:[5,5],borderWidth:1}}}:undefined}})})},100)}

function openMetricModal(){var today=new Date().toISOString().split('T')[0];var opts=Object.keys(METRICS).map(function(n){return'<option value="'+esc(n)+'">'+esc(n)+'</option>'}).join('');document.getElementById('metricModalInner').innerHTML='<h2><i class="fas fa-chart-line"></i> Log Health Reading</h2><div class="input-group"><label>Test / Metric *</label><select id="h_name"><option value="">Select test</option>'+opts+'</select></div><div class="form-row"><div class="input-group"><label>Value *</label><input type="number" id="h_value" step="0.1" placeholder="e.g. 95"></div><div class="input-group"><label>Date *</label><input type="date" id="h_date" value="'+today+'"></div></div><div class="input-group"><label>Notes (optional)</label><input id="h_notes" placeholder="Fasting, lab name..."></div><button class="btn btn-secondary btn-sm" style="margin-bottom:8px" onclick="document.getElementById(\'ocrFile\').click()"><i class="fas fa-wand-magic-sparkles"></i> Scan report photo (beta)</button><input type="file" id="ocrFile" accept="image/*" capture="environment" style="display:none" onchange="scanReport(event)"><div id="ocrStatus" style="font-size:.72rem;color:var(--text-dim);margin-bottom:8px"></div><div id="h_range" style="font-size:.75rem;color:var(--text-dim);margin-bottom:8px"></div><div class="modal-actions"><button class="btn btn-secondary" onclick="modal(\'metricModal\',false)">Cancel</button><button class="btn btn-primary" onclick="saveMetric()"><i class="fas fa-check"></i> Save</button></div>';document.getElementById('h_name').addEventListener('change',function(){var n=this.value;var m=METRICS[n];if(m)document.getElementById('h_range').innerHTML='<i class="fas fa-info-circle"></i> Normal range: <b>'+m.low+' \u2013 '+m.high+' '+m.unit+'</b>';else document.getElementById('h_range').innerHTML=''});modal('metricModal',true)}
function saveMetric(){var name=document.getElementById('h_name').value;var value=parseFloat(document.getElementById('h_value').value);var date=document.getElementById('h_date').value;if(!name||isNaN(value)||!date){toast('Fill all required fields','error');return}var all=getMetrics();all.push({id:'h_'+Date.now(),name:name,value:value,date:date,notes:document.getElementById('h_notes').value.trim()});setMetrics(all);modal('metricModal',false);renderTab();toast('Reading logged!','success')}

// FEATURE: MEMBER TIMELINE (activity history)
// ============================================================
function showMemberTimeline(){var m=currentMember;if(!m)return;var events=[];LS.get('visits_'+m.id,[]).forEach(function(v){events.push({date:v.date,icon:'fa-stethoscope',color:'var(--accent2)',title:'Dr. '+v.doctor,desc:v.diagnosis||v.speciality||'Visit'})});LS.get('meds_'+m.id,[]).forEach(function(med){if(med.startDate)events.push({date:med.startDate,icon:'fa-pills',color:'var(--accent)',title:'Started '+med.name,desc:[med.dosage,med.frequency].filter(Boolean).join(', ')})});LS.get('metrics_'+m.id,[]).forEach(function(r){events.push({date:r.date,icon:'fa-chart-line',color:'var(--warning)',title:r.name+': '+r.value,desc:''})});events.sort(function(a,b){return(b.date||'').localeCompare(a.date||'')});var html='<h2 style="justify-content:flex-start;margin-bottom:16px"><i class="fas fa-clock-rotate-left" style="color:var(--accent)"></i> Timeline</h2>';if(!events.length)html+='<p style="color:var(--text-dim)">No activity recorded yet.</p>';events.slice(0,20).forEach(function(e){html+='<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)"><div style="width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas '+e.icon+'" style="font-size:.75rem;color:'+e.color+'"></i></div><div style="flex:1"><div style="font-size:.85rem;font-weight:500">'+esc(e.title)+'</div><div style="font-size:.72rem;color:var(--text-dim)">'+esc(e.desc)+'</div></div><div style="font-size:.72rem;color:var(--text-muted);white-space:nowrap">'+fmtDate(e.date)+'</div></div>'});document.getElementById('confirmModalInner').innerHTML='<div style="text-align:left;max-height:70vh;overflow-y:auto">'+html+'</div><div class="modal-actions" style="justify-content:center"><button class="btn btn-secondary" onclick="modal(\'confirmModal\',false)">Close</button></div>';document.getElementById('confirmModal').querySelector('.modal').style.maxWidth='500px';modal('confirmModal',true)}

// ============================================================
// FEATURE: FAMILY EXPENSE TRACKER (medical costs)
// ============================================================
function renderExpenseWidget(){var expenses=LS.get('family_expenses',[]);var thisMonth=new Date().toISOString().slice(0,7);var monthTotal=expenses.filter(function(e){return(e.date||'').slice(0,7)===thisMonth}).reduce(function(s,e){return s+(e.amount||0)},0);return'<div class="glass" style="padding:20px;margin-bottom:24px"><div class="section-header" style="margin-bottom:12px"><h3 style="font-size:.95rem;display:flex;align-items:center;gap:8px"><i class="fas fa-indian-rupee-sign" style="color:var(--accent)"></i> Medical Expenses</h3><button class="btn btn-secondary btn-sm" onclick="openExpenseModal()"><i class="fas fa-plus"></i></button></div><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px"><span style="font-size:1.6rem;font-weight:700;color:var(--accent)">₹'+monthTotal.toLocaleString('en-IN')+'</span><span style="font-size:.75rem;color:var(--text-dim)">this month</span></div>'+(expenses.length?expenses.slice(0,4).map(function(e){return'<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.83rem"><div style="flex:1"><span style="font-weight:500">'+esc(e.desc)+'</span><span style="color:var(--text-dim);margin-left:6px;font-size:.72rem">'+esc(e.member||'')+'</span></div><div style="font-weight:600">₹'+e.amount.toLocaleString('en-IN')+'</div><div style="font-size:.7rem;color:var(--text-muted)">'+fmtDate(e.date)+'</div><button style="background:none;border:none;color:var(--danger);cursor:pointer;padding:4px" onclick="deleteExpense(\''+e.id+'\')"><i class="fas fa-xmark" style="font-size:.7rem"></i></button></div>'}).join(''):'<p style="color:var(--text-dim);font-size:.8rem;text-align:center">Track medical bills, pharmacy costs, insurance premiums</p>')+'</div>'}
function openExpenseModal(){document.getElementById('confirmModalInner').innerHTML='<h2 style="justify-content:flex-start"><i class="fas fa-indian-rupee-sign" style="color:var(--accent)"></i> Add Expense</h2><div style="text-align:left"><div class="input-group"><label>Description *</label><input id="exp_desc" placeholder="e.g. Blood test, Pharmacy, Dr. fee"></div><div class="form-row"><div class="input-group"><label>Amount (₹) *</label><input type="number" id="exp_amt" placeholder="500"></div><div class="input-group"><label>Date</label><input type="date" id="exp_date" value="'+new Date().toISOString().split('T')[0]+'"></div></div><div class="input-group"><label>Member</label><select id="exp_member"><option value="">General</option>'+members.map(function(m){return'<option>'+esc(m.name)+'</option>'}).join('')+'</select></div></div><div class="modal-actions"><button class="btn btn-secondary" onclick="modal(\'confirmModal\',false)">Cancel</button><button class="btn btn-primary" onclick="saveExpense()"><i class="fas fa-check"></i> Save</button></div>';modal('confirmModal',true)}
function saveExpense(){var desc=document.getElementById('exp_desc').value.trim();var amt=Number(document.getElementById('exp_amt').value);if(!desc||!amt){toast('Fill description & amount','error');return}var expenses=LS.get('family_expenses',[]);expenses.unshift({id:'e_'+Date.now(),desc:desc,amount:amt,date:document.getElementById('exp_date').value,member:document.getElementById('exp_member').value});LS.set('family_expenses',expenses);modal('confirmModal',false);showDashboard();toast('Expense added!','success')}
function deleteExpense(id){var expenses=LS.get('family_expenses',[]).filter(function(e){return e.id!==id});LS.set('family_expenses',expenses);showDashboard()}

// ============================================================
// FEATURE: UPCOMING FOLLOW-UPS (on dashboard)
// ============================================================
function getUpcomingFollowups(){var today=new Date().toISOString().split('T')[0];var upcoming=[];members.forEach(function(m){var visits=LS.get('visits_'+m.id,[]);visits.forEach(function(v){if(v.followup&&v.followup>=today){upcoming.push({member:m.name,memberId:m.id,doctor:v.doctor,date:v.followup,diagnosis:v.diagnosis})}})});return upcoming.sort(function(a,b){return a.date.localeCompare(b.date)})}
function renderFollowups(){var upcoming=getUpcomingFollowups();if(!upcoming.length)return'';var html='<div class="glass" style="padding:20px;margin-bottom:24px"><h3 style="font-size:.95rem;margin-bottom:14px;display:flex;align-items:center;gap:8px"><i class="fas fa-calendar-check" style="color:var(--warning)"></i> Upcoming Follow-ups</h3>';upcoming.slice(0,5).forEach(function(f){var daysAway=Math.ceil((new Date(f.date)-new Date())/(1000*60*60*24));html+='<div class="followup-card" onclick="viewMember(\''+f.memberId+'\')"><div style="width:40px;height:40px;border-radius:10px;background:rgba(255,165,2,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-calendar-day" style="color:var(--warning)"></i></div><div style="flex:1"><div class="fu-date">'+fmtDate(f.date)+(daysAway<=3?' <span style="font-size:.7rem;background:var(--danger);color:#fff;padding:1px 6px;border-radius:10px">in '+daysAway+'d</span>':'')+'</div><div class="fu-doc">Dr. '+esc(f.doctor)+(f.diagnosis?' — '+esc(f.diagnosis):'')+' ('+esc(f.member)+')</div></div></div>'});html+='</div>';return html}

// ============================================================
// FEATURE: FAMILY NOTES (shared notes/reminders)
// ============================================================
function renderNotesSection(){var notes=LS.get('family_notes',[]);return'<div class="glass" style="padding:20px;margin-bottom:24px"><div class="section-header" style="margin-bottom:12px"><h3 style="font-size:.95rem;display:flex;align-items:center;gap:8px"><i class="fas fa-note-sticky" style="color:var(--accent2)"></i> Family Notes</h3><button class="btn btn-secondary btn-sm" onclick="openNoteModal()"><i class="fas fa-plus"></i></button></div>'+(notes.length?notes.slice(0,5).map(function(n){return'<div style="padding:10px 14px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;font-size:.85rem"><div style="flex:1"><div>'+esc(n.text)+'</div><div style="font-size:.7rem;color:var(--text-muted);margin-top:4px">'+fmtDate(n.date)+' &middot; '+esc(n.by||'')+'</div></div><button style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:.75rem;flex-shrink:0;padding:4px" onclick="deleteNote(\''+n.id+'\')"><i class="fas fa-xmark"></i></button></div>'}).join(''):'<p style="color:var(--text-dim);font-size:.82rem;text-align:center;padding:12px">No notes yet. Add reminders, notes, or important info.</p>')+'</div>'}
function openNoteModal(){document.getElementById('confirmModalInner').innerHTML='<h2 style="justify-content:flex-start"><i class="fas fa-note-sticky" style="color:var(--accent2)"></i> Add Note</h2><div style="text-align:left"><div class="input-group"><label>Note</label><textarea id="note_text" placeholder="e.g. Renew insurance by March, Dad\'s checkup next week..." style="min-height:80px"></textarea></div><div class="input-group"><label>Added by</label><input id="note_by" placeholder="Your name"></div></div><div class="modal-actions"><button class="btn btn-secondary" onclick="modal(\'confirmModal\',false)">Cancel</button><button class="btn btn-primary" onclick="saveNote()"><i class="fas fa-check"></i> Save</button></div>';modal('confirmModal',true)}
function saveNote(){var text=document.getElementById('note_text').value.trim();if(!text){toast('Enter a note','error');return}var notes=LS.get('family_notes',[]);notes.unshift({id:'n_'+Date.now(),text:text,by:document.getElementById('note_by').value.trim(),date:new Date().toISOString().split('T')[0]});LS.set('family_notes',notes);modal('confirmModal',false);showDashboard();toast('Note added!','success')}
function deleteNote(id){var notes=LS.get('family_notes',[]).filter(function(n){return n.id!==id});LS.set('family_notes',notes);showDashboard()}

// ============================================================
// FEATURE: QUICK-ADD FAB (floating action button on mobile)
// ============================================================
function renderFAB(){var existing=document.getElementById('fab');if(existing)existing.remove();if(!document.getElementById('dashboardPage').classList.contains('active'))return;var fab=document.createElement('button');fab.id='fab';fab.className='fab';fab.innerHTML='<i class="fas fa-plus"></i>';fab.onclick=openMemberModal;document.body.appendChild(fab)}

// ============================================================
// UPDATE showDashboard to include new features
// ============================================================
var _origShowDashboard=showDashboard;
showDashboard=function(){_origShowDashboard();var grid=document.getElementById('membersGrid');var extra=document.getElementById('dashExtra');if(extra)extra.remove();var html='<div id="dashExtra">'+renderFollowups()+renderExpenseWidget()+renderNotesSection()+'</div>';grid.insertAdjacentHTML('beforebegin',html);var _f=document.getElementById('fab');if(_f)_f.remove()};

// INIT
function showBootLoader(on){var el=document.getElementById('bootLoader');if(on){if(!el){el=document.createElement('div');el.id='bootLoader';el.style.cssText='position:fixed;inset:0;z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg)';var sk='<div style="width:100%;max-width:560px;margin-top:8px;padding:0 16px"><div class="skel" style="height:52px;margin-bottom:14px"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"><div class="skel skel-card"></div><div class="skel skel-card"></div><div class="skel skel-card"></div><div class="skel skel-card"></div></div><div class="skel" style="height:120px;margin-bottom:10px"></div><div class="skel" style="height:120px"></div></div>';el.innerHTML='<div class="logo-icon" style="width:56px;height:56px;font-size:1.5rem"><i class="fas fa-shield-halved"></i></div><div style="color:var(--text-dim);font-size:.85rem;display:flex;align-items:center;gap:8px"><div class="spinner" style="width:16px;height:16px;border-width:2px"></div> Loading your vault…</div>'+sk;el.style.justifyContent='flex-start';el.style.paddingTop='60px';document.body.appendChild(el)}el.style.display='flex'}else if(el){el.remove()}}
if(localStorage.getItem('fv_auth')==='1'){
  if(LOCAL_MODE){showDashboard()}
  else if(API.token){
    document.getElementById('loginPage').classList.remove('active');
    showBootLoader(true);
    bootstrap().then(function(ok){showBootLoader(false);if(ok){showDashboard()}else{localStorage.removeItem('fv_auth');API.clearToken();showPage('loginPage')}}).catch(function(){showBootLoader(false);localStorage.removeItem('fv_auth');API.clearToken();showPage('loginPage')});
  }
  else{localStorage.removeItem('fv_auth')}
  if(getPinHash()&&localStorage.getItem('fv_auth')==='1'&&sessionStorage.getItem('fv_unlocked')!=='1'){lockApp()}
}
// Service worker (offline PWA)
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('service-worker.js').catch(function(){})})}
// Online/offline status
window.addEventListener('offline',function(){setSyncStatus('offline')});
window.addEventListener('online',function(){var el=document.getElementById('syncChip');if(el)el.classList.remove('show')});
// Home-screen shortcuts (?a=add|search|contacts) — run after content is ready
function handleShortcut(){try{var a=new URLSearchParams(location.search).get('a');if(!a)return;if(localStorage.getItem('fv_auth')!=='1')return;setTimeout(function(){if(a==='add')openMemberModal();else if(a==='search')openGlobalSearch();else if(a==='contacts')openContacts()},400);history.replaceState({},'',location.pathname)}catch(e){}}
handleShortcut();
</script>
</body>
</html>
